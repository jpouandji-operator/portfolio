<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GON Push Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#e8e8e8;font-family:'Courier New',monospace;min-height:100vh;}
.header{background:#000;border-bottom:1px solid #1a1a1a;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:15px;font-weight:800;color:#c8a96e;letter-spacing:0.1em;}
.logo-sub{font-size:9px;color:#444;letter-spacing:0.15em;text-transform:uppercase;margin-top:2px;}
.stat-row{display:flex;gap:12px;align-items:center;}
.stat{font-size:11px;font-weight:700;}
.stat.pushed{color:#74c69d;}
.stat.failed{color:#f87171;}
.main{max-width:920px;margin:0 auto;padding:20px 24px;}
.card{background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:14px 18px;margin-bottom:14px;}
.card-label{font-size:9px;color:#c8a96e;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;font-weight:700;}
.token-row{display:flex;gap:8px;}
.token-input{flex:1;background:#0d0d0d;border:1px solid #222;border-radius:4px;padding:7px 10px;color:#e8e8e8;font-family:'Courier New',monospace;font-size:12px;outline:none;}
.token-input:focus{border-color:#c8a96e;}
.btn{font-family:'Courier New',monospace;font-size:11px;font-weight:700;letter-spacing:0.08em;padding:7px 16px;border-radius:4px;cursor:pointer;transition:all 0.2s;border:none;}
.btn-gold{background:#c8a96e;color:#000;}
.btn-gold:hover{background:#e8c98e;}
.btn-gold:disabled{background:#222;color:#555;cursor:not-allowed;}
.btn-outline{background:none;border:1px solid #222;color:#555;}
.btn-outline:hover{border-color:#c8a96e;color:#c8a96e;}
.btn-small{padding:4px 10px;font-size:10px;}
.table-row{display:flex;gap:6px;margin-bottom:10px;}
.table-btn{background:transparent;border:1px solid #222;color:#666;border-radius:4px;padding:5px 12px;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;}
.table-btn.active{background:#c8a96e;color:#000;border-color:#c8a96e;font-weight:700;}
.mode-row{display:flex;gap:6px;}
.textarea{width:100%;height:200px;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:4px;padding:10px 12px;color:#bbb;font-family:'Courier New',monospace;font-size:11px;resize:vertical;outline:none;line-height:1.5;}
.textarea:focus{border-color:#333;}
.textarea-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.char-count{font-size:10px;color:#444;}
.records-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.records-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.1em;}
.record-card{background:#111;border:1px solid #1e1e1e;border-radius:6px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}
.record-card.success{border-color:#2d6a4f;}
.record-card.error{border-color:#7f1d1d;}
.record-card.pushing{border-color:#c8a96e;}
.record-card-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;}
.record-checkbox{accent-color:#c8a96e;width:16px;height:16px;cursor:pointer;flex-shrink:0;}
.record-meta{flex:1;}
.record-id{font-size:11px;color:#c8a96e;font-weight:700;letter-spacing:0.08em;margin-bottom:2px;}
.record-name{font-size:12px;color:#e8e8e8;font-weight:600;line-height:1.3;}
.record-market{font-size:10px;color:#666;margin-top:2px;}
.record-status{display:flex;align-items:center;gap:8px;}
.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;}
.status-pushed{color:#74c69d;}
.status-failed{color:#f87171;}
.status-pushing{color:#c8a96e;}
.error-msg{padding:8px 16px;background:#1a0000;color:#f87171;font-size:11px;}
.preview-btn{background:none;border:1px solid #222;color:#555;border-radius:4px;padding:3px 8px;cursor:pointer;font-family:'Courier New',monospace;font-size:10px;}
.preview-btn:hover{border-color:#444;color:#aaa;}
.record-preview{border-top:1px solid #1a1a1a;padding:12px 16px;display:none;}
.record-preview.open{display:block;}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.preview-field-key{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;}
.preview-field-val{font-size:11px;color:#bbb;line-height:1.4;word-break:break-word;}
.log{background:#080808;border:1px solid #1a1a1a;border-radius:6px;padding:12px 14px;margin-top:14px;}
.log-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.log-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:0.12em;}
.log-clear{background:none;border:none;color:#444;font-size:10px;cursor:pointer;font-family:'Courier New',monospace;}
.log-body{max-height:160px;overflow-y:auto;}
.log-line{font-size:11px;line-height:1.7;}
.log-line.success{color:#74c69d;}
.log-line.error{color:#f87171;}
.log-line.info{color:#666;}
.log-time{color:#2a2a2a;margin-right:8px;}
.single-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-group.full{grid-column:1/-1;}
.field-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.1em;}
.field-input,.field-select,.field-textarea{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:4px;padding:6px 8px;color:#e8e8e8;font-family:'Courier New',monospace;font-size:11px;outline:none;width:100%;}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:#c8a96e;}
.field-select{cursor:pointer;}
.field-textarea{resize:vertical;line-height:1.5;}
.market-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.market-tag{font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid #222;color:#666;cursor:pointer;transition:all 0.15s;}
.market-tag.selected{background:#c8a96e;color:#000;border-color:#c8a96e;font-weight:700;}
.push-row{display:flex;justify-content:flex-end;margin-top:14px;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">GON PUSH TOOL</div>
    <div class="logo-sub">Scan Output to Airtable — Direct Integration</div>
  </div>
  <div class="stat-row">
    <span class="stat pushed" id="statPushed" style="display:none"></span>
    <span class="stat failed" id="statFailed" style="display:none"></span>
    <span style="font-size:10px;color:#333;">Base: appAr4TpVGHSoh9CU</span>
  </div>
</div>

<div class="main">

  <!-- TOKEN -->
  <div class="card">
    <div class="card-label">Airtable Token</div>
    <div id="tokenSaved" style="display:none;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:11px;color:#74c69d;" id="tokenActiveLabel">Token active</span>
      <button class="btn btn-outline btn-small" onclick="clearToken()">Clear</button>
    </div>
    <div id="tokenInput" class="token-row">
      <input type="password" class="token-input" id="tokenField" placeholder="Paste your Personal Access Token (pat...)"/>
      <button class="btn btn-gold" onclick="saveToken()">Save</button>
    </div>
  </div>

  <!-- TABLE + MODE -->
  <div style="display:flex;gap:10px;margin-bottom:14px;">
    <div class="card" style="flex:1;margin-bottom:0;">
      <div class="card-label">Target Table</div>
      <div class="table-row">
        <button class="table-btn active" onclick="setTable('Benchmarks',this)">Benchmarks</button>
        <button class="table-btn" onclick="setTable('Theses',this)">Theses</button>
        <button class="table-btn" onclick="setTable('Gap Map',this)">Gap Map</button>
        <button class="table-btn" onclick="setTable('Intelligence Network',this)">Intel Network</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:0;">
      <div class="card-label">Mode</div>
      <div class="mode-row">
        <button class="table-btn active" onclick="setMode('batch',this)">Batch Scan</button>
        <button class="table-btn" onclick="setMode('single',this)">Single Entry</button>
      </div>
    </div>
  </div>

  <!-- BATCH MODE -->
  <div id="batchMode">
    <div class="card">
      <div class="card-label">Paste GON Scan Output</div>
      <textarea class="textarea" id="scanInput" placeholder="Paste scan benchmark entries here.&#10;&#10;Expected format:&#10;### GON-FIN-001 - Metric Name&#10;**Entry ID:** GON-FIN-001&#10;**Metric Name:** ...&#10;**Value:** ...&#10;**Market:** Kenya, Nigeria&#10;...&#10;---&#10;### GON-REG-012 - Next entry..."></textarea>
      <div class="textarea-footer">
        <span class="char-count" id="charCount">0 chars</span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline btn-small" onclick="clearInput()">Clear</button>
          <button class="btn btn-gold" onclick="parseInput()">Parse</button>
        </div>
      </div>
    </div>

    <div id="recordsSection" style="display:none;">
      <div class="records-header">
        <div class="records-label" id="recordsLabel">0 records parsed</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline btn-small" onclick="toggleAll()">Select all</button>
          <button class="btn btn-gold" id="pushBtn" onclick="pushSelected()">Push to Airtable</button>
        </div>
      </div>
      <div id="recordsList"></div>
    </div>
  </div>

  <!-- SINGLE MODE -->
  <div id="singleMode" style="display:none;">
    <div class="card">
      <div class="card-label" id="singleLabel">Single Benchmark Entry</div>
      <div id="singleForm"></div>
      <div class="push-row">
        <button class="btn btn-gold" onclick="pushSingle()">Push to Airtable</button>
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div class="log" id="logSection" style="display:none;">
    <div class="log-header">
      <span class="log-label">Activity Log</span>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

</div>

<script>
const BASE_ID = 'appAr4TpVGHSoh9CU';
let currentTable = 'Benchmarks';
let currentMode = 'batch';
let records = [];
let selected = new Set();
let statuses = {};
let errors = {};
let pushCount = 0;
let failCount = 0;
let singleMarkets = [];

// ── FIELD MAPS ──────────────────────────────────────────────────────────────
const BENCHMARK_MAP = {
  "Entry ID":"Entry ID","Metric Name":"Metric Name","Value":"Value",
  "Value Type":"Value Type","Market":"Market","Sector":"Sector",
  "IC Dimension":"IC Dimension","Data Tier":"Data Tier","Source Name":"Source Name",
  "Source URL":"Source URL","Source Date":"Source Date",
  "Entry Status":"Entry Status","Recency Test":"Recency Test","Recency Note":"Recency Note",
  "Specificity Test":"Specificity Test","Specificity Note":"Specificity Note",
  "Interpretability Test":"Interpretability Test","Interpretability Note":"Interpretability Note",
  "Three-Test Status":"Three-Test Status","Confidence Level":"Confidence Level","Capital Structure":"Capital Structure","Exit Multiple Comparable":"Exit Multiple Comparable","Funding Trend Data":"Funding Trend Data",
  "Operator Note":"Operator Note","IC Checklist Implication":"IC Checklist Implication",
  "Linked Articles":"Linked Articles","Linked Thesis ID":"Linked Thesis ID",
  "Tier B Provenance":"Tier B Provenance","Notes":"Notes","Added By":"Added By",
};

const THESES_MAP = {
  "Thesis Statement":"Thesis Statement",
  "Source Article":"Source Article","Thesis State":"Thesis State",
  "Confirming Evidence":"Confirming Evidence","Disconfirming Evidence":"Disconfirming Evidence",
  "Markets Where True":"Markets Where True","Markets Where Fragmented":"Markets Where Fragmented",
  "Created Date":"Created Date","Linked Benchmarks":"Linked Benchmarks","Notes":"Notes",
};

const GAPMAP_MAP = {
  "Gap ID":"Gap ID","Gap Description":"Gap Description","Market":"Market",
  "Sector":"Sector","IC Dimension Affected":"IC Dimension Affected","Gap Type":"Gap Type",
  "Investment Signal":"Investment Signal","Priority":"Priority",
  "Status":"Status","Linked Benchmarks":"Linked Benchmarks","Notes":"Notes",
};

const BENCHMARK_MULTI = new Set(["Market"]);
const GAPMAP_MULTI = new Set(["Market"]);

const NETWORK_MAP = {
  "Contact ID":"Contact ID",
  "Name":"Name",
  "Organisation":"Organisation",
  "Layer":"Layer",
  "Market":"Market",
  "IC Dimension":"IC Dimension",
  "Access Type":"Access Type",
  "Last Contact":"Last Contact",
  "Extracted Signal":"Extracted Signal",
  "Status":"Status",
  "Notes":"Notes",
};
const NETWORK_MULTI = new Set(["Market","IC Dimension"]);

const NORMALISE = {

  // Capital structure values
  "Debt dominant":"Debt dominant",
  "Equity dominant":"Equity dominant", 
  "Blended / hybrid":"Blended / hybrid",
  "Mixed":"Mixed",
  "Tier A - Cited source":"Tier A - Cited Source",
  "Tier A - cited source":"Tier A - Cited Source",
  "Tier B - Operator network signal":"Tier B - Operator network",
  "Tier B - operator network signal":"Tier B - Operator network",
  "Pass With Flag":"Pass with flag","Pass With Caveat":"Pass with caveat",
  "Directional Only":"Directional only","Pan-African":"Pan African",
  "Sub-Saharan Africa":"Sub Saharan Africa","DR Congo":"DRC",
  "Cameroon":"Cameroun","Announced":"Announced",
};

const MARKETS = ["Algeria","Angola","Benin","Botswana","Burkina Faso","Cameroun","CAR",
  "CEMAC","Chad","Congo","DRC","East Africa","Egypt","Equatorial Guinea","Ethiopia",
  "Gabon","Ghana","Guinea-Bissau","Ivory Coast","Kenya","Malawi","Mali","Morocco",
  "Mozambique","Niger","Nigeria","Pan African","Rwanda","Senegal","South Africa",
  "Sub Saharan Africa","Tanzania","Togo","Tunisia","Uganda","WAEMU","West Africa","Zambia","Zimbabwe"];

function getFieldMap() {
  if (currentTable === 'Theses') return { map: THESES_MAP, multi: new Set() };
  if (currentTable === 'Gap Map') return { map: GAPMAP_MAP, multi: GAPMAP_MULTI };
  if (currentTable === 'Intelligence Network') return { map: NETWORK_MAP, multi: NETWORK_MULTI };
  return { map: BENCHMARK_MAP, multi: BENCHMARK_MULTI };
}

// ── TOKEN ────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('gon_push_token') || ''; }
function saveToken() {
  const val = document.getElementById('tokenField').value.trim();
  if (!val) return;
  localStorage.setItem('gon_push_token', val);
  showTokenActive(val);
  addLog('Token saved to browser storage', 'info');
}
function showTokenActive(token) {
  document.getElementById('tokenInput').style.display = 'none';
  const saved = document.getElementById('tokenSaved');
  saved.style.display = 'flex';
  document.getElementById('tokenActiveLabel').textContent = 'Token active — ' + token.substring(0,16) + '...';
}
function clearToken() {
  localStorage.removeItem('gon_push_token');
  document.getElementById('tokenField').value = '';
  document.getElementById('tokenSaved').style.display = 'none';
  document.getElementById('tokenInput').style.display = 'flex';
}
function initToken() {
  const t = getToken();
  if (t) showTokenActive(t);
}

// ── TABLE / MODE ─────────────────────────────────────────────────────────────
function setTable(name, btn) {
  currentTable = name;
  document.querySelectorAll('.table-btn').forEach(b => {
    if (b.parentElement.parentElement.querySelector('.card-label').textContent === 'Target Table')
      b.classList.remove('active');
  });
  btn.classList.add('active');
  if (currentMode === 'single') buildSingleForm();
}
function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-row .table-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('batchMode').style.display = mode === 'batch' ? 'block' : 'none';
  document.getElementById('singleMode').style.display = mode === 'single' ? 'block' : 'none';
  if (mode === 'single') buildSingleForm();
}

// ── PARSER ───────────────────────────────────────────────────────────────────
function parseInput() {
  const text = document.getElementById('scanInput').value.trim();
  if (!text) return;
  const { map, multi } = getFieldMap();
  // Strip comment-only lines (# and ##) but PRESERVE ### section headers
  const cleanText = text.split('\n').filter(line => {
    const t = line.trim();
    if (t.startsWith('###')) return true;
    if (t.startsWith('##') || (t.startsWith('#') && !t.startsWith('###'))) return false;
    return true;
  }).join('\n');
  const sections = cleanText.split(/(?=###\s+)/g).map(s => s.trim()).filter(s => s.length > 20);

  records = [];
  sections.forEach((section, i) => {
    // Skip sections that belong to a different table
    const isGapSection = /###\s+(?:ENTRY\s+)?GAP-\d{3}/.test(section);
    const isBenchSection = /###\s+(?:ENTRY\s+)?GON-[A-Z]+-\d{3}/.test(section);
    const isThesisSection = /###\s+(?:ENTRY\s+)?THX-\d{3}/.test(section);
    const isNetworkSection = /###\s+(?:CONTACT\s+)?NET-\d{3}/.test(section);
    if (currentTable === 'Gap Map' && !isGapSection) return;
    if (currentTable === 'Benchmarks' && !isBenchSection) return;
    if (currentTable === 'Theses' && !isThesisSection) return;
    if (currentTable === 'Intelligence Network' && !isNetworkSection) return;
    const rec = {};
    const lines = section.split('\n');
    for (const line of lines) {
      const ci = line.indexOf(':');
      if (ci === -1) continue;
      const rawKey = line.substring(0, ci).replace(/\*\*/g, '').trim();
      const rawVal = line.substring(ci + 1).trim().replace(/\*\*/g, '').trim();
      if (!rawKey || !rawVal) continue;
      const mapped = map[rawKey];
      if (!mapped) continue;
      const norm = NORMALISE[rawVal] || rawVal;
      if (multi.has(mapped)) {
        rec[mapped] = rawVal.split(',').map(v => (NORMALISE[v.trim()] || v.trim())).filter(Boolean);
      } else {
        rec[mapped] = norm;
      }
    }
    // Extract ID from heading
    if (!rec['Entry ID'] && !rec['Thesis ID'] && !rec['Gap ID']) {
      const m = section.match(/###\s+(?:ENTRY\s+|GAP\s+)?(GON-[A-Z]+-\d{3}|GAP-\d{3})/) || section.match(/###\s+([\w-]+\d{3})/);
      if (m) {
        if (currentTable === 'Theses') { /* Theses use Thesis Statement as primary */ }
        else if (currentTable === 'Gap Map') rec['Gap ID'] = m[1];
        else rec['Entry ID'] = m[1];
      }
    }
    // Extract name from heading
    const nameMatch = section.match(/Metric Name:\s*(.+)/) ||
      section.match(/Gap Description:\s*(.+)/) ||
      section.match(/Thesis Statement:\s*(.+)/) ||
      section.match(/###\s+(?:ENTRY\s+|GAP\s+)?[\w-]+(?:-[\w]+)*\s*[-:]\s*(.+)/) ||
      section.match(/Name:\s*(.+)/);
    if (nameMatch) {
      if (currentTable === 'Theses' && !rec['Thesis Statement']) {
        // Don't overwrite thesis statement with heading
      } else if (currentTable === 'Gap Map' && !rec['Gap Description']) {
        rec['Gap Description'] = nameMatch[1].trim();
      } else if (!rec['Metric Name'] && currentTable !== 'Gap Map') {
        rec['Metric Name'] = nameMatch[1].trim();
      }
    }
    // Defaults for benchmarks
    if (currentTable === 'Benchmarks') {
      if (!rec['Added By']) rec['Added By'] = 'GON Scan - auto-generated';
      if (!rec['Entry Status']) rec['Entry Status'] = 'Active';
    }
    // Defaults for Intelligence Network
    if (currentTable === 'Intelligence Network') {
      if (!rec['Status']) rec['Status'] = 'Active';
    }
    records.push({ fields: rec, index: i });
  });

  selected = new Set(records.map(r => r.index));
  statuses = {};
  errors = {};
  renderRecords();
  addLog('Parsed ' + records.length + ' record(s)', 'info');
}

function renderRecords() {
  const section = document.getElementById('recordsSection');
  const list = document.getElementById('recordsList');
  if (!records.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  document.getElementById('recordsLabel').textContent = records.length + ' record(s) — ' + selected.size + ' selected';
  document.getElementById('pushBtn').textContent = 'Push ' + selected.size + ' to Airtable';

  list.innerHTML = records.map(r => {
    const f = r.fields;
    const id = f['Entry ID'] || f['Gap ID'] || f['Contact ID'] || f['Thesis ID'] || '?';
    const name = f['Metric Name'] || f['Thesis Statement'] || f['Gap Description'] || f['Name'] || 'Unknown';
    const market = Array.isArray(f['Market']) ? f['Market'].join(', ') : (f['Market'] || '');
    const st = statuses[r.index];
    const err = errors[r.index];
    const sel = selected.has(r.index);
    return `
      <div class="record-card ${st||''}" id="rc-${r.index}">
        <div class="record-card-header" onclick="toggleSelect(${r.index})">
          <input type="checkbox" class="record-checkbox" ${sel?'checked':''} onclick="event.stopPropagation();toggleSelect(${r.index})"/>
          <div class="record-meta">
            <div class="record-id">${id}</div>
            <div class="record-name">${name.substring(0,80)}${name.length>80?'...':''}</div>
            ${market?`<div class="record-market">${market}</div>`:''}
          </div>
          <div class="record-status">
            ${st==='success'?'<span class="status-badge status-pushed">PUSHED</span>':''}
            ${st==='error'?'<span class="status-badge status-failed">FAILED</span>':''}
            ${st==='pushing'?'<span class="status-badge status-pushing">PUSHING</span>':''}
            <button class="preview-btn" onclick="event.stopPropagation();togglePreview(${r.index})">Preview</button>
          </div>
        </div>
        ${err?`<div class="error-msg">Error: ${err}</div>`:''}
        <div class="record-preview" id="preview-${r.index}">
          <div class="preview-grid">
            ${Object.entries(f).slice(0,16).map(([k,v])=>`
              <div>
                <div class="preview-field-key">${k}</div>
                <div class="preview-field-val">${Array.isArray(v)?v.join(', '):String(v).substring(0,150)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleSelect(idx) {
  if (selected.has(idx)) selected.delete(idx); else selected.add(idx);
  renderRecords();
}
function toggleAll() {
  if (selected.size === records.length) selected.clear();
  else records.forEach(r => selected.add(r.index));
  renderRecords();
}
function togglePreview(idx) {
  const el = document.getElementById('preview-' + idx);
  el.classList.toggle('open');
}

// ── PUSH ─────────────────────────────────────────────────────────────────────
async function pushSelected() {
  const token = getToken();
  if (!token) { addLog('No token saved', 'error'); return; }
  const toPush = records.filter(r => selected.has(r.index));
  if (!toPush.length) { addLog('No records selected', 'error'); return; }
  addLog('Pushing ' + toPush.length + ' record(s) to ' + currentTable + '...', 'info');

  for (const rec of toPush) {
    setStatus(rec.index, 'pushing');
    try {
      const result = await airtablePush(token, currentTable, rec.fields);
      setStatus(rec.index, 'success');
      pushCount++;
      addLog((rec.fields['Entry ID']||rec.fields['Gap ID']||(rec.fields['Thesis Statement']||'').substring(0,30)||'Record') + ' — ID: ' + result.id, 'success');
    } catch(e) {
      setStatus(rec.index, 'error', e.message);
      failCount++;
      addLog((rec.fields['Entry ID']||rec.fields['Gap ID']||(rec.fields['Thesis Statement']||'').substring(0,30)||'Record') + ' FAILED: ' + e.message, 'error');
    }
    await new Promise(r => setTimeout(r, 350));
  }
  updateStats();
  addLog('Done', 'info');
}

function setStatus(idx, status, errMsg) {
  statuses[idx] = status;
  if (errMsg) errors[idx] = errMsg;
  renderRecords();
}

async function airtablePush(token, tableName, fields) {
  const url = 'https://api.airtable.com/v0/' + BASE_ID + '/' + encodeURIComponent(tableName);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || 'HTTP ' + res.status);
  return data;
}

function updateStats() {
  const sp = document.getElementById('statPushed');
  const sf = document.getElementById('statFailed');
  if (pushCount > 0) { sp.textContent = pushCount + ' pushed'; sp.style.display = 'inline'; }
  if (failCount > 0) { sf.textContent = failCount + ' failed'; sf.style.display = 'inline'; }
}

  } else {

    form.innerHTML = `

        ${tf('Entry ID','text')}${tf('Metric Name','text')}

        ${sf('IC Dimension',['Distribution economics','Regulatory environment','Exit dynamics','Demand validation','Unit economics','Infrastructure','Currency / macro risk','Team / operator capability','Capital structure and financing'])}

function tf(name, type, span) {
  const spanClass = span === 'full' ? 'full' : '';
  if (type === 'textarea') {
    return `<div class="field-group ${spanClass}"><div class="field-label">${name}</div><textarea class="field-textarea" id="sf_${name.replace(/ /g,'_')}" rows="3"></textarea></div>`;
  }
  return `<div class="field-group ${spanClass}"><div class="field-label">${name}</div><input type="text" class="field-input" id="sf_${name.replace(/ /g,'_')}"/></div>`;
}
function sf(name, options) {
  return `<div class="field-group"><div class="field-label">${name}</div><select class="field-select" id="sf_${name.replace(/ /g,'_')}"><option value="">— select —</option>${options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
}
function toggleMarket(el, market) {
  el.classList.toggle('selected');
  if (el.classList.contains('selected')) singleMarkets.push(market);
  else singleMarkets = singleMarkets.filter(m => m !== market);
}

async function pushSingle() {
  const token = getToken();
  if (!token) { addLog('No token', 'error'); return; }
  const { map } = getFieldMap();
  const fields = {};
  for (const [key] of Object.entries(map)) {
    const id = 'sf_' + key.replace(/ /g,'_');
    const el = document.getElementById(id);
    if (el && el.value) fields[key] = el.value;
  }
  if (singleMarkets.length) fields['Market'] = singleMarkets;
  addLog('Pushing single record to ' + currentTable + '...', 'info');
  try {
    const result = await airtablePush(token, currentTable, fields);
    pushCount++;
    updateStats();
    addLog('Pushed — Airtable ID: ' + result.id, 'success');
  } catch(e) {
    failCount++;
    updateStats();
    addLog('Failed: ' + e.message, 'error');
  }
}

// ── LOG ──────────────────────────────────────────────────────────────────────
const logEntries = [];
function addLog(msg, type) {
  const t = new Date().toLocaleTimeString();
  logEntries.push({ msg, type, t });
  const section = document.getElementById('logSection');
  const body = document.getElementById('logBody');
  section.style.display = 'block';
  body.innerHTML = [...logEntries].reverse().map(e =>
    `<div class="log-line ${e.type}"><span class="log-time">${e.t}</span>${e.msg}</div>`
  ).join('');
}
function clearLog() {
  logEntries.length = 0;
  document.getElementById('logBody').innerHTML = '';
  document.getElementById('logSection').style.display = 'none';
}
function clearInput() {
  document.getElementById('scanInput').value = '';
  document.getElementById('charCount').textContent = '0 chars';
  document.getElementById('recordsSection').style.display = 'none';
  records = [];
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('scanInput').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length + ' chars';
});
document.addEventListener('DOMContentLoaded', initToken);
</script>
